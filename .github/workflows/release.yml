# ============================================================================
# LuoScope 自动发布工作流
# 当推送 tag (v*) 时自动构建并发布到 GitHub Releases
# ============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'
  # fork 仓库首次需在 Settings → Actions 启用后再手动触发
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    env:
      # 覆盖 src-tauri/.cargo/config.toml 的 D 盘 target-dir，CI 产物固定到 src-tauri/target
      CARGO_TARGET_DIR: ${{ github.workspace }}/src-tauri/target

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      # 本地 .cargo/config.toml 指向 D 盘，CI 临时禁用，避免产物写到 runner 的 D:\DevCache
      - name: Configure CI cargo output paths
        shell: pwsh
        run: |
          $targetRoot = Join-Path $env:GITHUB_WORKSPACE 'src-tauri/target'
          "CARGO_TARGET_DIR=$targetRoot" >> $env:GITHUB_ENV
          "CARGO_RELEASE_DIR=$targetRoot/release" >> $env:GITHUB_ENV
          "CARGO_NSIS_DIR=$targetRoot/release/bundle/nsis" >> $env:GITHUB_ENV

          $cargoConfig = 'src-tauri/.cargo/config.toml'
          if (Test-Path $cargoConfig) {
            Rename-Item $cargoConfig "$cargoConfig.ci-off"
            Write-Host "Disabled local cargo config for CI"
          }
          Write-Host "CARGO_TARGET_DIR=$targetRoot"

      - name: Resolve release tag
        shell: pwsh
        run: |
          if ('${{ github.ref_type }}' -eq 'tag') {
            $tag = '${{ github.ref_name }}'
          } else {
            # workflow_dispatch 从 main 触发时，用 tauri.conf.json 版本号作为 Release tag
            $version = (Get-Content 'src-tauri/tauri.conf.json' -Raw | ConvertFrom-Json).version
            $tag = "v$version"
          }
          "RELEASE_TAG=$tag" >> $env:GITHUB_ENV
          Write-Host "Release tag: $tag"

      # luoscope.key 本身已是 Tauri 需要的 Base64 单行；Secret 直接粘贴该文件全文即可
      - name: Prepare Tauri signing key
        shell: pwsh
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_KEY)) {
            throw 'GitHub Secret TAURI_SIGNING_PRIVATE_KEY 未配置'
          }
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_PASSWORD)) {
            throw 'GitHub Secret TAURI_SIGNING_PRIVATE_KEY_PASSWORD 未配置'
          }

          $keyPath = Join-Path $env:RUNNER_TEMP 'luoscope.key'
          $raw = ($env:SIGNING_KEY -replace '\s', '').Trim()

          # 写入临时文件，供 tauri build / tauri signer 按路径读取
          [IO.File]::WriteAllText($keyPath, $raw, (New-Object System.Text.UTF8Encoding $false))

          try {
            $inner = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($raw))
          } catch {
            throw 'TAURI_SIGNING_PRIVATE_KEY 无效：请直接粘贴 .tauri/luoscope.key 全文（单行，通常以 dW50 开头）'
          }

          if ($inner -notmatch 'encrypted secret key') {
            throw 'TAURI_SIGNING_PRIVATE_KEY 格式不对：不要对 luoscope.key 再做二次 Base64，只粘贴文件原文一行'
          }

          $password = $env:SIGNING_PASSWORD.Trim()
          "TAURI_SIGNING_PRIVATE_KEY=$keyPath" >> $env:GITHUB_ENV
          "TAURI_PRIVATE_KEY=$keyPath" >> $env:GITHUB_ENV
          "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$password" >> $env:GITHUB_ENV
          "TAURI_PRIVATE_KEY_PASSWORD=$password" >> $env:GITHUB_ENV
          Write-Host "Signing key ready: $keyPath"

      - name: Build the app and create GitHub Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 不用 tauri-action：其按 package.json.name(luo-scope) 找产物，与 productName(LuoScope) 不一致会报 No artifacts were found
          npm run tauri build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $tag = $env:RELEASE_TAG
          $version = (Get-Content 'src-tauri/tauri.conf.json' -Raw | ConvertFrom-Json).version
          $nsisDir = $env:CARGO_NSIS_DIR

          if (-not (Test-Path $nsisDir)) {
            throw "NSIS 安装包目录不存在: $nsisDir (CARGO_TARGET_DIR=$env:CARGO_TARGET_DIR)"
          }

          $notesPath = Join-Path $env:RUNNER_TEMP 'release-notes.md'
          @"
          ## LuoScope 首个公开发布

          - **全功能免费**：12 个清理/分析模块与分栏布局均免费开放
          - **官方下载渠道**：GitHub Releases + 微信公众号「LuoScope」
          - **垃圾软件清理**、**分栏布局**、**磁盘变化分析**、**品牌 LuoScope**（兼容旧版 LightC 数据迁移）
          - **Aurora UI**、模块扫描态统一、启动屏与设置页体验优化

          完整变更见 [CHANGELOG.md](https://github.com/RobustLuo/light-c/blob/main/CHANGELOG.md)。
          "@ | Out-File -FilePath $notesPath -Encoding utf8

          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "LuoScope v$version" --notes-file $notesPath
          }

          $uploadFiles = @(Get-ChildItem -Path $nsisDir -File | Where-Object { $_.Extension -in '.exe', '.sig', '.zip' })
          if ($uploadFiles.Count -eq 0) {
            throw '未找到可上传的 NSIS 安装包'
          }
          gh release upload $tag --clobber @($uploadFiles | ForEach-Object { $_.FullName })

          $latestJson = Get-ChildItem $env:CARGO_RELEASE_DIR -Filter 'latest.json' -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($latestJson) {
            gh release upload $tag --clobber $latestJson.FullName
          }

          Write-Host "Release $tag published with $($uploadFiles.Count) NSIS artifact(s)" -ForegroundColor Green

      - name: Create normal installer exe signature
        shell: pwsh
        run: |
          $ReleaseExe = Join-Path $env:CARGO_RELEASE_DIR 'LuoScope.exe'
          $PreservedInstallerExe = "LuoScope_installer_runtime.exe"

          if (-not (Test-Path $ReleaseExe)) {
            Write-Host "Error: normal installer runtime LuoScope.exe not found at $ReleaseExe" -ForegroundColor Red
            Write-Host "CARGO_TARGET_DIR=$env:CARGO_TARGET_DIR" -ForegroundColor Yellow
            exit 1
          }

          # 必须在 WebView2 离线包二次构建前签名；后续 tauri build 会覆盖 target\release\LuoScope.exe。
          Copy-Item $ReleaseExe $PreservedInstallerExe -Force
          $SignatureOutput = npx tauri signer sign $ReleaseExe
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Error: installer exe signing failed" -ForegroundColor Red
            exit $LASTEXITCODE
          }
          $GeneratedSigPath = "$ReleaseExe.sig"
          if (Test-Path $GeneratedSigPath) {
            $SignatureText = Get-Content -Raw -Path $GeneratedSigPath
            if ($SignatureText.TrimStart().StartsWith("untrusted comment:")) {
              $SignatureBase64 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($SignatureText))
            } else {
              $SignatureBase64 = $SignatureText.Trim()
            }
          } else {
            $SignatureBase64 = ($SignatureOutput -split "`r?`n" | Where-Object { $_ -match '^[A-Za-z0-9+/=]+$' } | Select-Object -Last 1)
            if (-not $SignatureBase64) {
              Write-Host "Error: installer exe signature output not found" -ForegroundColor Red
              exit 1
            }
          }

          $SignatureBase64 | Out-File -FilePath "LuoScope_installer_exe.sig" -Encoding utf8 -NoNewline
          Write-Host "  Created: LuoScope_installer_exe.sig" -ForegroundColor Green

      # 以下额外打包 WebView2 离线安装包和绿色便携版并上传到同一个 Release

      - name: Create WebView2 offline installer
        shell: pwsh
        run: |
          $ConfigPath = "tauri.webview2-offline.conf.json"
          $OutputName = "LuoScope_webview2_offline_x64.exe"

          Write-Host "Creating WebView2 offline installer..." -ForegroundColor Cyan

          $OfflineConfig = @{
            bundle = @{
              createUpdaterArtifacts = $false
              windows = @{
                webviewInstallMode = @{
                  type = "offlineInstaller"
                  silent = $true
                }
                nsis = @{
                  installerHooks = "nsis/installer-hooks-webview2-offline.nsh"
                }
              }
            }
          }
          $OfflineConfig | ConvertTo-Json -Depth 8 | Out-File -FilePath $ConfigPath -Encoding utf8

          npx tauri build --bundles nsis --config $ConfigPath
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Error: WebView2 offline installer build failed" -ForegroundColor Red
            exit $LASTEXITCODE
          }

          $Installer = Get-ChildItem -Path $env:CARGO_NSIS_DIR -Filter "*.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $Installer) {
            Write-Host "Error: NSIS installer not found" -ForegroundColor Red
            exit 1
          }

          Copy-Item $Installer.FullName $OutputName -Force
          Write-Host "  Created: $OutputName" -ForegroundColor Green

          $OfflineRuntimeExe = Join-Path $env:CARGO_RELEASE_DIR 'LuoScope.exe'
          if (-not (Test-Path $OfflineRuntimeExe)) {
            Write-Host "Error: WebView2 offline runtime LuoScope.exe not found" -ForegroundColor Red
            exit 1
          }

          $SignatureOutput = npx tauri signer sign $OfflineRuntimeExe
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Error: WebView2 offline exe signing failed" -ForegroundColor Red
            exit $LASTEXITCODE
          }
          $GeneratedSigPath = "$OfflineRuntimeExe.sig"
          if (Test-Path $GeneratedSigPath) {
            $SignatureText = Get-Content -Raw -Path $GeneratedSigPath
            if ($SignatureText.TrimStart().StartsWith("untrusted comment:")) {
              $SignatureBase64 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($SignatureText))
            } else {
              $SignatureBase64 = $SignatureText.Trim()
            }
          } else {
            $SignatureBase64 = ($SignatureOutput -split "`r?`n" | Where-Object { $_ -match '^[A-Za-z0-9+/=]+$' } | Select-Object -Last 1)
            if (-not $SignatureBase64) {
              Write-Host "Error: WebView2 offline exe signature output not found" -ForegroundColor Red
              exit 1
            }
          }

          $SignatureBase64 | Out-File -FilePath "LuoScope_webview2_offline_exe.sig" -Encoding utf8 -NoNewline
          Write-Host "  Created: LuoScope_webview2_offline_exe.sig" -ForegroundColor Green
          echo "webview2_offline_installer=$OutputName" >> $env:GITHUB_OUTPUT
        id: webview2_offline

      - name: Create portable package
        shell: pwsh
        run: |
          $ReleaseDir = $env:CARGO_RELEASE_DIR
          $PortableDir = "portable_temp"
          $ZipName = "LuoScope_portable_x64.zip"
          $PreservedInstallerExe = "LuoScope_installer_runtime.exe"

          Write-Host "Creating portable package..." -ForegroundColor Cyan

          New-Item -ItemType Directory -Path $PortableDir -Force | Out-Null

          # 主程序
          $PortableSourceExe = if (Test-Path $PreservedInstallerExe) { $PreservedInstallerExe } else { "$ReleaseDir\LuoScope.exe" }
          if (-not (Test-Path $PortableSourceExe)) {
            Write-Host "Error: LuoScope.exe not found" -ForegroundColor Red
            exit 1
          }
          # 便携版使用常规安装版同一份 runtime exe，避免 WebView2 离线包二次构建后的 exe 被误打进便携包。
          Copy-Item $PortableSourceExe "$PortableDir\LuoScope.exe" -Force
          Write-Host "  Copied: LuoScope.exe" -ForegroundColor White

          # 旧 marker 保留给旧版本兼容；新版同时读取带 schema 的 manifest 来决定数据目录布局。
          Set-Content -Path "$PortableDir\LuoScope.portable" -Value "portable" -Encoding UTF8
          Write-Host "  Created: LuoScope.portable" -ForegroundColor White
          $PortableManifest = [ordered]@{
            schema_version = 1
            mode = "portable"
            data_layout = "relative"
          }
          $PortableManifest | ConvertTo-Json | Out-File -FilePath "$PortableDir\LuoScope.portable.json" -Encoding utf8
          Write-Host "  Created: LuoScope.portable.json" -ForegroundColor White

          # DLL 文件
          $DllFiles = Get-ChildItem -Path $ReleaseDir -Filter "*.dll" -ErrorAction SilentlyContinue
          if ($DllFiles) {
            foreach ($dll in $DllFiles) {
              Copy-Item $dll.FullName $PortableDir -Force
              Write-Host "  Copied: $($dll.Name)" -ForegroundColor White
            }
          }

          # resources 目录
          if (Test-Path "$ReleaseDir\resources") {
            Copy-Item "$ReleaseDir\resources" "$PortableDir\resources" -Recurse -Force
            Write-Host "  Copied: resources/" -ForegroundColor White
          }

          # 官方下载渠道不写死在前端，随 Release 上传 download.json，便于后续调整网盘地址。
          $DownloadConfig = [ordered]@{
            githubReleasesUrl = "https://github.com/RobustLuo/light-c/releases"
            wechatOfficialAccountName = "LuoScope"
            bilibiliUrl = "https://github.com/RobustLuo"
            douyinUrl = "https://github.com/RobustLuo"
          }
          $DownloadConfig | ConvertTo-Json | Out-File -FilePath "download.json" -Encoding utf8
          Write-Host "  Created: download.json" -ForegroundColor Green

          # 压缩
          Compress-Archive -Path "$PortableDir\*" -DestinationPath $ZipName -Force
          Write-Host "  Created: $ZipName" -ForegroundColor Green

          # 签名对象必须是最终便携包内的 LuoScope.exe；manifest 不参与 exe 签名，避免改变现有校验链路。
          $SignatureOutput = npx tauri signer sign "$PortableDir\LuoScope.exe"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Error: portable exe signing failed" -ForegroundColor Red
            exit $LASTEXITCODE
          }
          $GeneratedSigPath = "$PortableDir\LuoScope.exe.sig"
          if (Test-Path $GeneratedSigPath) {
            $SignatureText = Get-Content -Raw -Path $GeneratedSigPath
            if ($SignatureText.TrimStart().StartsWith("untrusted comment:")) {
              # 原始 minisign 文本需要转成 Tauri updater 风格的 Public signature 字符串。
              $SignatureBase64 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($SignatureText))
            } else {
              # 有些 CLI 版本会直接写入 Public signature，直接复用可避免双重 base64。
              $SignatureBase64 = $SignatureText.Trim()
            }
          } else {
            # CLI 正常会生成 .sig 文件；这里兜底解析 stdout 中的 Public signature，避免把说明文字写进签名资产。
            $SignatureBase64 = ($SignatureOutput -split "`r?`n" | Where-Object { $_ -match '^[A-Za-z0-9+/=]+$' } | Select-Object -Last 1)
            if (-not $SignatureBase64) {
              Write-Host "Error: signature output not found" -ForegroundColor Red
              exit 1
            }
          }
          $SignatureBase64 | Out-File -FilePath "LuoScope_portable_exe.sig" -Encoding utf8 -NoNewline
          Write-Host "  Created: LuoScope_portable_exe.sig" -ForegroundColor Green

          # 清理临时目录
          Remove-Item $PortableDir -Recurse -Force

          # 输出文件名供后续步骤使用
          echo "portable_zip=$ZipName" >> $env:GITHUB_OUTPUT
        id: portable

      - name: Upload extra assets to release
        shell: pwsh
        run: |
          $ZipPath = "LuoScope_portable_x64.zip"
          $InstallerSigPath = "LuoScope_installer_exe.sig"
          $WebView2OfflineSigPath = "LuoScope_webview2_offline_exe.sig"
          $PortableSigPath = "LuoScope_portable_exe.sig"
          $DownloadConfigPath = "download.json"
          $WebView2OfflineInstallerPath = "LuoScope_webview2_offline_x64.exe"
          if ((Test-Path $ZipPath) -and (Test-Path $InstallerSigPath) -and (Test-Path $WebView2OfflineSigPath) -and (Test-Path $PortableSigPath) -and (Test-Path $DownloadConfigPath) -and (Test-Path $WebView2OfflineInstallerPath)) {
            Write-Host "Uploading extra assets to release..." -ForegroundColor Cyan
            gh release upload ${{ env.RELEASE_TAG }} $ZipPath $InstallerSigPath $WebView2OfflineSigPath $PortableSigPath $DownloadConfigPath $WebView2OfflineInstallerPath --clobber
            Write-Host "Upload done!" -ForegroundColor Green
          } else {
            Write-Host "Error: portable zip, exe signatures, download config or WebView2 offline installer not found" -ForegroundColor Red
            exit 1
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
